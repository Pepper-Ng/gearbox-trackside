<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trackside Kiosk</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Trackside</h1>
        <p id="status">Connecting to local host...</p>
      </div>
      <a href="/api/health">Health</a>
    </header>
    <section class="summary" id="summary"></section>
    <section class="drivers">
      <h2>Fixture Drivers</h2>
      <table>
        <thead>
          <tr>
            <th>Pos</th>
            <th>Driver</th>
            <th>Rig</th>
            <th>Best</th>
            <th>Gap</th>
          </tr>
        </thead>
        <tbody id="drivers"></tbody>
      </table>
    </section>
  </main>
  <script src="/app.js" type="module"></script>
</body>
</html>
